<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrackMapRenderer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #map { width: 100%; height: 100%; }

        .map-label {
            background: white;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 12px;
            font-family: Arial, sans-serif;
            color: #333;
            white-space: nowrap;
            box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .title-overlay {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            text-align: center;
            font-family: Arial, sans-serif;
            pointer-events: none;
            max-width: 90%;
        }

        .title-overlay .title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .title-overlay .subtitle {
            font-size: 12px;
            opacity: 0.85;
        }

        .leaflet-control-attribution {
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        /*CONFIG_PLACEHOLDER*/

        function escapeHtml(str) {
            var div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        (function() {
            var tileUrl = config.tileUrl;
            if (config.mapTheme === 'dark') {
                tileUrl = 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
            }

            var map = L.map('map', {
                zoomControl: false,
                attributionControl: true
            });

            L.tileLayer(tileUrl, {
                maxZoom: 19,
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            var bounds = L.latLngBounds();
            var points = config.points;

            for (var i = 0; i < points.length; i++) {
                bounds.extend([points[i].lat, points[i].lon]);
            }

            if (config.showTrack && points.length > 1) {
                var trackCoords = points.map(function(p) { return [p.lat, p.lon]; });
                L.polyline(trackCoords, {
                    color: '#1976D2',
                    weight: 4,
                    dashArray: '10, 6',
                    opacity: 0.9
                }).addTo(map);
            }

            if (config.showMarkers) {
                var markerColors = {
                    start: '#4CAF50',
                    middle: '#2196F3',
                    finish: '#F44336'
                };

                for (var i = 0; i < points.length; i++) {
                    var p = points[i];
                    var color = markerColors[p.type] || markerColors.middle;

                    var icon = L.divIcon({
                        className: 'custom-marker',
                        html: '<div style="width:14px;height:14px;background:' + color + ';border:3px solid white;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);"></div>',
                        iconSize: [14, 14],
                        iconAnchor: [7, 7]
                    });

                    L.marker([p.lat, p.lon], { icon: icon }).addTo(map);

                    if (config.showLabels && p.label) {
                        var labelIcon = L.divIcon({
                            className: 'map-label',
                            html: '<div class="map-label">' + escapeHtml(p.label) + '</div>',
                            iconSize: null,
                            iconAnchor: [-10, 8]
                        });
                        L.marker([p.lat, p.lon], { icon: labelIcon, interactive: false }).addTo(map);
                    }
                }
            }

            if (config.title || config.subtitle) {
                var titleDiv = L.DomUtil.create('div', 'title-overlay');
                var titleHtml = '';
                if (config.title) {
                    titleHtml += '<div class="title">' + escapeHtml(config.title) + '</div>';
                }
                if (config.subtitle) {
                    titleHtml += '<div class="subtitle">' + escapeHtml(config.subtitle) + '</div>';
                }
                titleDiv.innerHTML = titleHtml;

                var TitleControl = L.Control.extend({
                    options: { position: 'topleft' },
                    onAdd: function() { return titleDiv; }
                });
                new TitleControl().addTo(map);
            }

            if (config.autoFit && bounds.isValid()) {
                map.fitBounds(bounds, { padding: [config.padding, config.padding] });
            } else {
                map.setView([0, 0], 2);
            }

            map.whenReady(function() {
                window.__mapReady = true;
            });
        })();
    </script>
</body>
</html>
